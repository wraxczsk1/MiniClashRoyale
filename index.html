<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Invertfronts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg"></div>

  <div class="logo">
    <div class="logo-icon"></div>
    <h1>INVERTFRONTS</h1>
  </div>

  <div class="menu">
    <button id="single">Singleplayer</button>
    <button id="multi">Multiplayer</button>
    <button id="store">Store</button>
  </div>

  <div class="card left">
    <h3>Free Quest</h3>
    <p>Získej odměnu za splnění úkolu.</p>
    <button class="small">Complete Quest</button>
  </div>

  <div class="card right">
    <h3>Invertfronts Cloaks</h3>
    <p>Nové pláště dostupné v obchodě.</p>
  </div>

  <div class="version">Invertfronts 0.1.0</div>

  <script src="main.js"></script>
</body>
</html>
