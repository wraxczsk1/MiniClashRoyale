<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Invertfronts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="background"></div>

  <div class="logo-container">
    <div class="logo-icon"></div>
    <h1 class="logo-text">INVERTFRONTS</h1>
  </div>

  <div class="menu">
    <button class="menu-btn" id="btn-singleplayer">Singleplayer</button>
    <button class="menu-btn" id="btn-multiplayer">Multiplayer</button>
    <button class="menu-btn" id="btn-store">Store</button>
  </div>

  <div class="bottom-left card">
    <h3>Free Quest</h3>
    <p>Získej speciální kosmetiku na omezený čas!</p>
    <button class="small-btn">Complete Quest</button>
  </div>

  <div class="bottom-right card">
    <h3>Invertfronts Cloaks</h3>
    <p>Odemykej nové pláště hraním.</p>
  </div>

  <div class="version-label">
    Invertfronts 0.1.0 (prototype)
  </div>

  <script src="main.js"></script>
</body>
</html>
